syntax = "proto3";

package godotnet.control;

option go_package = "github.com/jordanstites/godotnet/internal/proto;controlpb";

// ---- Handshake / keepalive messages ----------------------------------

message Login {
  bytes credentials = 1;
}

message LoginResponse {
  bool   ok            = 1;
  string error_message = 2;
  uint32 player_id     = 3;
  string session_token = 4;
  string udp_endpoint  = 5;
}

message UdpHandshake {
  uint32 player_id     = 1;
  string session_token = 2;
}

message UdpHandshakeAck {
  bool   ok        = 1;
  uint32 player_id = 2;
}

message Ping {
  uint64 nonce = 1;
}

message Pong {
  uint64 nonce = 1;
}

// ---- Wire-level wrappers --------------------------------------------

// ClientFrame is the wire-level wrapper for every message sent from
// client to server, over both TCP and UDP. The Godot client constructs
// this and the library unmarshals it on receive.
message ClientFrame {
  oneof body {
    Login login = 1;
    UdpHandshake udp_handshake = 2;
    Pong pong = 3;
    // game_payload is the marshaled user-defined top-level
    // ClientMessage. The library does not parse it itself; it is
    // unmarshaled into Config.ClientMessagePrototype and dispatched.
    bytes game_payload = 16;
  }
}

// ServerFrame is the wire-level wrapper for every message sent from
// server to client.
message ServerFrame {
  oneof body {
    LoginResponse login_response = 1;
    UdpHandshakeAck udp_handshake_ack = 2;
    Ping ping = 3;
    bytes game_payload = 16;
  }
}
